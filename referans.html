<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description"
        content="RADPYS V3 referansları — 84+ kurum, 6200+ aktif kullanıcı. Hastane, görüntüleme merkezi ve diş grupları." />
    <title>Referanslar — RADPYS V3</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
        href="https://api.fontshare.com/v2/css?f[]=clash-display@300,400,500,600,700&f[]=manrope@300,400,500,600,700&f[]=jetbrains-mono@400,500&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="assets/css/tokens.css" />
</head>

<body>
    <div id="site-nav"></div>
    <main>
        <section class="relative pt-40 pb-12 overflow-hidden">
            <div class="blob blob-teal" style="top:-10%; left:-10%; width:520px; height:520px; border-radius:9999px">
            </div>
            <div class="blob blob-purple" style="top:10%; right:-15%; width:560px; height:560px; border-radius:9999px">
            </div>
            <div class="absolute inset-0 bg-grid bg-grid-fade opacity-70"></div>
            <div class="relative container-narrow">
                <span class="section-label">Referanslar</span>
                <h1 class="mt-6 font-display text-5xl md:text-7xl leading-[1] tracking-[-0.03em]">
                    <span class="reveal-mask d1"><span>Türkiye'nin dört bir</span></span>
                    <span class="reveal-mask d2"><span>yanından ekipler.</span></span>
                </h1>
            </div>
        </section>

        <section class="relative py-20 border-t border-white/5">
            <div class="container-narrow grid md:grid-cols-4 gap-8" id="stats-grid"></div>
        </section>

        <section class="relative py-16 border-y border-white/5" style="background:rgba(0,0,0,0.2)">
            <div class="container-narrow mb-8"><span class="section-label">Bize güvenenler</span></div>
            <div class="marquee">
                <div class="marquee-track" id="mq-a"></div>
                <div class="marquee-track" id="mq-b" aria-hidden="true"></div>
            </div>
        </section>

        <section class="relative py-24">
            <div class="container-narrow">
                <span class="section-label">Ne diyorlar?</span>
                <h2 class="reveal mt-6 font-display text-4xl md:text-5xl tracking-tight">Kendi sözleriyle.</h2>
                <div class="mt-14 grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="tst"></div>
            </div>
        </section>

        <section class="relative py-24 text-center">
            <a href="iletisim.html" class="btn btn-primary">Ekibinize de RADPYS Uygun mu? Konuşalım.</a>
        </section>
    </main>
    <div id="site-footer"></div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        const { STATS, TESTIMONIALS } = window.RADPYS;
        const items = [
            { k: "institutions", label: "Kurum", suf: "+" },
            { k: "users", label: "Aktif Kullanıcı", suf: "+" },
            { k: "years", label: "Yıllık Deneyim", suf: "" },
            { k: "modules", label: "Modül", suf: "" },
        ];
        document.getElementById("stats-grid").innerHTML = items.map(s => `
      <div class="reveal border-t border-white/10 pt-6">
        <div class="font-display text-5xl md:text-6xl text-glow-teal">${STATS[s.k]}${s.suf}</div>
        <div class="mt-2 font-mono text-[11px] uppercase tracking-[0.28em] text-slate-500">${s.label}</div>
      </div>`).join("");

        const LOGOS = ["Anadolu Üniversite Hastanesi", "Mavi Görüntüleme", "Beyaz Diş Grubu", "Ege Nükleer Tıp", "Marmara Radyoloji", "Batı Veteriner Klinikleri", "Karadeniz Sağlık A.Ş.", "İç Anadolu Hastanesi", "Doğu Onkoloji"];
        const html = LOGOS.map(l => `<span style="display:inline-flex; padding:1rem 1.5rem; border:1px solid rgba(255,255,255,0.1); border-radius:0.5rem; background:rgba(255,255,255,0.02)"><span class="font-display text-lg text-slate-300 whitespace-nowrap">${l}</span></span>`).join("");
        document.getElementById("mq-a").innerHTML = html;
        document.getElementById("mq-b").innerHTML = html;

        document.getElementById("tst").innerHTML = TESTIMONIALS.map(t => `
      <div class="reveal card card-lift p-7 h-full flex flex-col">
        <div class="font-display text-3xl text-neon-teal leading-none">"</div>
        <p class="mt-2 text-white/90 font-display text-lg leading-snug">${t.quote}</p>
        <div class="mt-auto pt-6 flex items-center gap-3">
          <img src="${t.avatar}" alt="${t.author}" loading="lazy" class="w-11 h-11 rounded-full object-cover ring-1 ring-white/20" />
          <div><div class="text-sm">${t.author}</div><div class="text-xs text-slate-400">${t.role} · ${t.org}</div></div>
        </div>
      </div>`).join("");
    </script>
</body>

</html>
