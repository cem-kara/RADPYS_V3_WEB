<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="RADPYS V3 demo talebi. 20 dakikalık canlı gösterim ayarlayalım." />
    <title>İletişim & Demo — RADPYS V3</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
        href="https://api.fontshare.com/v2/css?f[]=clash-display@300,400,500,600,700&f[]=manrope@300,400,500,600,700&f[]=jetbrains-mono@400,500&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind.config.js"></script>
    <link rel="stylesheet" href="assets/css/tokens.css" />
</head>

<body>
    <div id="site-nav"></div>
    <main>
        <section class="relative pt-40 pb-12 overflow-hidden">
            <div class="blob blob-teal" style="top:-10%; left:-10%; width:520px; height:520px; border-radius:9999px">
            </div>
            <div class="blob blob-purple" style="top:10%; right:-15%; width:560px; height:560px; border-radius:9999px">
            </div>
            <div class="absolute inset-0 bg-grid bg-grid-fade opacity-70"></div>
            <div class="relative container-narrow">
                <span class="section-label">İletişim & Demo</span>
                <h1 class="mt-6 font-display text-5xl md:text-7xl leading-[1] tracking-[-0.03em]">
                    <span class="reveal-mask d1"><span>20 dakika, canlı,</span></span>
                    <span class="reveal-mask d2"><span>kurumunuza özel.</span></span>
                </h1>
                <p class="reveal mt-6 max-w-2xl text-slate-300 text-lg">Formu doldurun; 1 iş günü içinde bir uzman geri
                    döner.</p>
            </div>
        </section>

        <section class="relative py-16">
            <div class="container-narrow grid lg:grid-cols-12 gap-10">
                <div class="reveal lg:col-span-7">
                    <form id="demo-form" class="rounded-2xl border border-white/10 bg-white/[0.02] p-8">
                        <div class="grid md:grid-cols-2 gap-5">
                            <div>
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">Ad
                                    Soyad</label>
                                <input required name="name" class="input" placeholder="Adınız" />
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">Kurum</label>
                                <input required name="organization" class="input" placeholder="Kurumunuz" />
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">Rol</label>
                                <input required name="role" class="input" placeholder="Örn. Bölüm Başkanı" />
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">E-posta</label>
                                <input required type="email" name="email" class="input" placeholder="ad@kurum.com" />
                            </div>
                            <div class="md:col-span-2">
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">Telefon</label>
                                <input required name="phone" class="input" placeholder="+90 555 000 00 00" />
                            </div>
                            <div class="md:col-span-2">
                                <label
                                    class="block text-xs font-mono uppercase tracking-[0.22em] text-slate-400 mb-2">Mesaj
                                    (opsiyonel)</label>
                                <textarea rows="4" name="message" class="input" style="resize:none"
                                    placeholder="Beklentileriniz, ekip büyüklüğü, öncelik…"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-8"
                            style="width:100%; justify-content:center">Talebi Gönder →</button>
                        <p class="mt-4 text-xs text-slate-500">Form gönderildiğinde e-posta uygulamanız açılır ve talep
                            bize iletilmek üzere hazırlanır.</p>
                    </form>
                </div>

                <div class="reveal lg:col-span-5">
                    <div class="rounded-2xl border border-white/10 p-8"
                        style="background:linear-gradient(180deg, rgba(20,184,166,0.06), transparent)">
                        <h3 class="font-display text-2xl">Ofis</h3>
                        <div class="mt-6 space-y-4 text-sm text-slate-300">
                            <div style="display:flex; gap:0.75rem"><svg width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" style="margin-top:2px">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                    <circle cx="12" cy="10" r="3" />
                                </svg> İstanbul</div>
                            <div style="display:flex; gap:0.75rem"><svg width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" style="margin-top:2px">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                    <polyline points="22,6 12,13 2,6" />
                                </svg> <a href="mailto:radpys.iletisim@gmail.com"
                                    class="hover:text-white">radpys.iletisim@gmail.com</a>
                            </div>
                            <div style="display:flex; gap:0.75rem"><svg width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" style="margin-top:2px">
                                    <path
                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.93.35 1.84.66 2.72a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.36-1.23a2 2 0 0 1 2.11-.45c.88.31 1.79.53 2.72.66A2 2 0 0 1 22 16.92z" />
                                </svg> </div>
                        </div>
                        <div class="mt-8 rounded-lg overflow-hidden border border-white/10 relative"
                            style="aspect-ratio:16/9">
                            <div class="absolute inset-0"
                                style="background:radial-gradient(circle at 50% 50%, rgba(34,211,238,0.15), transparent 60%)">
                            </div>
                            <div class="absolute inset-0 bg-grid bg-grid-fade opacity-60"></div>
                            <div class="absolute inset-0 grid place-items-center text-center">
                                <div>
                                    <div
                                        class="inline-flex items-center gap-2 font-mono text-[10px] uppercase tracking-[0.24em] text-neon-teal">
                                        <span class="w-2 h-2 rounded-full"
                                            style="background:#14b8a6; animation:pulse 2s infinite"></span> Ankara / TR
                                    </div>
                                    <div class="mt-2 font-display text-3xl">39.90° K · 32.85° D</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="site-footer"></div>

    <script src="assets/js/layout.js"></script>
    <script>
        // Static form → open mail client with prefilled subject/body
        document.getElementById("demo-form").addEventListener("submit", function (e) {
            e.preventDefault();
            const f = new FormData(this);
            const body = [
                "Ad Soyad: " + (f.get("name") || "-"),
                "Kurum: " + (f.get("organization") || "-"),
                "Rol: " + (f.get("role") || "-"),
                "E-posta: " + (f.get("email") || "-"),
                "Telefon: " + (f.get("phone") || "-"),
                "",
                "Mesaj:",
                f.get("message") || "-",
            ].join("\n");
            const subject = "[RADPYS Demo] " + (f.get("organization") || "Yeni talep");
            const url = "mailto:hello@radpys.com" +
                "?subject=" + encodeURIComponent(subject) +
                "&body=" + encodeURIComponent(body);
            window.location.href = url;
            showToast("E-posta uygulamanız açılıyor. Gönderi tamamlanınca size döneceğiz.");
            this.reset();
        });
    </script>
    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }
    </style>
</body>

</html>
